# Nginx reverse proxy for Monero daemon RPC (Android emulator + iOS simulator friendly)
#
# LAN note:
# This proxy listens on all interfaces (0.0.0.0) so both emulators and LAN clients can reach it.
# If you want to restrict access later, use a firewall rule or add allow/deny in the server block.
#
# Purpose:
# - Provide a stable local endpoint on the Mac host (127.0.0.1:18081)
# - Forward to the real LAN monerod (192.168.4.137:18081)
#
# Use:
# - iOS simulator:        http://127.0.0.1:18081
# - Android emulator:     http://10.0.2.2:18081   (10.0.2.2 = host from emulator)
# - Real devices (LAN):   http://192.168.4.137:18081  (skip proxy if possible)
#
# Why this config:
# Some Monero daemon binary endpoints (e.g. /get_blocks.bin, /get_blocks_by_height.bin)
# can be sensitive to proxy connection handling. In particular, forcing "Connection: close"
# or passing through client Connection headers may cause truncated responses
# ("UnexpectedEof", "IncompleteBody", "response body closed before all bytes were read").
#
# This config:
# - Uses an `upstream` with keepalive
# - Strips Connection header so nginx manages keepalive correctly
# - Disables request/response buffering to stream large binary bodies
# - Uses long timeouts to avoid mid-stream shutdowns
# - Adds conservative proxy headers and disables response compression

upstream monerod_upstream {
    server 192.168.4.137:18081;
    keepalive 32;
}

server {
    # Listen on all interfaces so Android emulator (10.0.2.2), iOS simulator, and LAN clients can all reach it.
    listen 0.0.0.0:18081;
    server_name localhost;

    client_max_body_size 1024m;

    access_log /opt/homebrew/var/log/nginx/monerod_proxy.access.log;
    error_log  /opt/homebrew/var/log/nginx/monerod_proxy.error.log info;

    # Timeouts: bulk sync can take a while.
    proxy_connect_timeout 10s;
    proxy_send_timeout    600s;
    proxy_read_timeout    600s;
    send_timeout          600s;

    # Stream large binary bodies (no buffering/temp files).
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_max_temp_file_size 0;

    proxy_http_version 1.1;

    # Key: do NOT forward Connection semantics from the client;
    # let nginx manage upstream keepalive.
    proxy_set_header Connection "";

    # Don't retry mid-stream.
    proxy_next_upstream off;

    # Conservative, transparent proxy headers (useful for logging/debugging; harmless to monerod).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Avoid any content-encoding transformations for binary endpoints.
    proxy_set_header Accept-Encoding "";

    location / {
        proxy_http_version 1.1;
        proxy_pass http://monerod_upstream;
    }
}
